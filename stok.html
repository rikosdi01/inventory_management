<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .navbar {
            overflow: hidden;
            background-color: #EB1E26;
            position: fixed;
            top: 0;
            width: 100%;
            height: 7vh;
            z-index: 1000;
        }

        .navbar a {
            float: right;
            display: block;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 25px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            padding: 80px 20px 20px 20px;
        }

        .search-bar {
            padding: 0 20px 0 0;
        }

        .search-bar input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .button-cell {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            align-items: center;
        }

        .button-cell button {
            padding: 5px 10px;
            background-color: #EB1E26;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .button-cell button:hover {
            background-color: #d01720;
        }

        .hidden {
            display: none;
        }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #d01720;
            border-radius: 50%;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab a {
            color: white;
            font-size: 24px;
            text-decoration: none;
        }

        .fab:hover {
            background-color: #d01720;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 5px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
        }

        .modal input,
        .modal select,
        .modal button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .modal button {
            background-color: #EB1E26;
            color: white;
            border: none;
            cursor: pointer;
        }

        .modal button:hover {
            background-color: #d01720;
        }

        .modal .button-cell {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="home.html">Menu Utama</a>
        <a href="kategori.html">Kategori</a>
        <a href="item.html">Item</a>
        <a href="stok.html">Tambah Stok</a>
    </div>

    <div class="content">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari stok...">
        </div>
        <table id="stokTable">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Kondisi Barang</th>
                    <th>Rak</th>
                    <th>Baris</th>
                    <th>Nomor Kotak</th>
                    <th>Trip</th>
                    <th>Tanggal Masuk</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="stokList">
                <!-- Rows will be inserted here -->
            </tbody>
        </table>
    </div>

    <div class="fab">
        <a href="#" id="openModal">+</a>
    </div>

    <!-- Modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2></h2>
            <label for="kategoriSelect">Kategori:</label>
            <select id="kategoriSelect">
                <option value="all">Semua</option>
            </select>

            <label for="itemSelect">Item:</label>
            <select id="itemSelect">
                <option value="">Pilih Item</option>
            </select>

            <label for="qtyInput">Qty:</label>
            <input type="number" id="qtyInput" min="0" placeholder="Qty">

            <label for="kondisiSelect">Kondisi Barang:</label>
            <select id="kondisiSelect">
                <option value="Sudah Kemas">Sudah Kemas</option>
                <option value="Belum Kemas">Belum Kemas</option>
                <option value="Perlu Ganti Kemasan">Perlu Ganti Kemasan</option>
            </select>

            <label for="rakInput">Rak:</label>
            <input type="text" id="rakInput" placeholder="Rak">

            <label for="barisInput">Baris:</label>
            <input type="text" id="barisInput" placeholder="Baris">

            <label for="nomorKotakInput">Nomor Kotak:</label>
            <input type="text" id="nomorKotakInput" placeholder="Nomor Kotak">

            <label for="tripInput">Trip:</label>
            <input type="text" id="tripInput" placeholder="Trip">

            <label for="tanggalInput">Tanggal Masuk:</label>
            <input type="date" id="tanggalInput">

            <div class="button-cell">
                <button id="saveStok">Simpan</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from "./firebase-config.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        import { getDatabase, ref, push, get, set, update, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const db = getDatabase();

        let stokList = document.getElementById('stokList');
        let searchInput = document.getElementById('searchInput');

        let modal = document.getElementById("myModal");
        let btn = document.getElementById("openModal");
        let span = document.getElementsByClassName("close")[0];
        let saveButton = document.getElementById("saveStok");
        let itemSelect = document.getElementById('itemSelect');
        let kategoriSelect = document.getElementById('kategoriSelect');
        let qtyInput = document.getElementById('qtyInput');
        let kondisiSelect = document.getElementById('kondisiSelect');
        let rakInput = document.getElementById('rakInput');
        let barisInput = document.getElementById('barisInput');
        let nomorKotakInput = document.getElementById('nomorKotakInput');
        let tripInput = document.getElementById('tripInput');
        let tanggalInput = document.getElementById('tanggalInput');

        btn.onclick = function () {
            // Reset modal fields
            clearForm();
            populateKategoriSelect(); // Populate dropdown with categories
            populateItemSelect('all');

            // Set modal title to "Add New Item"
            const modalTitle = document.querySelector('.modal-content h2');
            modalTitle.textContent = "Tambah Stok";

            // Change save button text to "Save"
            saveButton.textContent = "Save";

            // Show modal
            modal.style.display = "block";

            // Update button functionality for adding new item
            saveButton.onclick = function () {
                const selectedItem = itemSelect.value;
                const selectedKategori = kategoriSelect.value;
                const newQtyValue = qtyInput.value.trim();
                const newKondisiValue = kondisiSelect.value;
                const newRakValue = rakInput.value.trim();
                const newBarisValue = barisInput.value.trim();
                const newNomorKotakValue = nomorKotakInput.value.trim();
                const newTripValue = tripInput.value.trim();
                const newTanggalValue = tanggalInput.value.trim();


                if (selectedItem && selectedKategori && newQtyValue && newKondisiValue && newRakValue && newBarisValue && newNomorKotakValue && newTripValue && newTanggalValue) {
                    // Add new item to the database
                    const newStokRef = push(ref(db, 'Stok'));
                    set(newStokRef, {
                        item: selectedItem,
                        kategori: selectedKategori,
                        qty: newQtyValue,
                        kondisi: newKondisiValue,
                        rak: newRakValue,
                        baris: newBarisValue,
                        nomorKotak: newNomorKotakValue,
                        trip: newTripValue,
                        tanggal: newTanggalValue,
                    }).then(() => {
                        alert("Item berhasil ditambahkan");
                        clearForm();
                        modal.style.display = "none";
                        populateStokList();
                    }).catch((error) => {
                        alert("Gagal menambahkan item");
                        console.error(error);
                    });
                } else {
                    alert("Pilih kategori dan masukkan item yang valid");
                }
            };
        };

        span.onClick = function () {
            modal.style.display = "none";
        }

        const closeModal = document.getElementsByClassName('close')[0];

        closeModal.onclick = function () {
            modal.style.display = "none";
        };

        saveButton.onclick = function () {
            const selectedItem = itemSelect.value;
            const selectedKategori = kategoriSelect.value;
            const qty = parseInt(qtyInput.value);
            const kondisi = kondisiSelect.value;
            const rak = rakInput.value.trim();
            const baris = barisInput.value.trim();
            const nomorKotak = nomorKotakInput.value.trim();
            const trip = tripInput.value.trim();
            const tanggal = tanggalInput.value.trim();

            if (selectedItem && selectedKategori && qty && qty && kondisi && rak && baris && nomorKotak && trip && tanggal) {
                const newStokRef = push(ref(db, "Stok"));
                set(newStokRef, {
                    item: selectedItem,
                    kategori: selectedKategori,
                    qty: qty,
                    kondisi: kondisi,
                    rak: rak,
                    baris: baris,
                    nomorKotak: nomorKotak,
                    trip: trip,
                    tanggal: tanggal,
                }).then(() => {
                    alert("Item berhasil ditambahkan");
                    clearForm();
                    modal.style.display = "none";
                    populateStokList();
                }).catch((error) => {
                    alert("Gagal menambahkan item");
                    console.error(error);
                });
            } else {
                alert("Pilih kategori dan masukkan item yang valid");
            }
        }


        function clearForm() {
            itemSelect.value = '';
            kategoriSelect.value = 'all';
            qtyInput.value = '';
            kondisiSelect.value = '';
            rakInput.value = '';
            barisInput.value = '';
            nomorKotakInput.value = '';
            tripInput.value = '';
            tanggalInput.value = '';
        }

        function populateKategoriSelect() {
            return new Promise((resolve, reject) => {
                const kategoriRef = ref(db, 'Kategori');
                get(kategoriRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        let kategoriSet = new Set();
                        snapshot.forEach((item) => {
                            const itemData = item.val();
                            if (itemData.kategori) {
                                kategoriSet.add(itemData.kategori);
                            }
                        });
                        let sortedKategori = Array.from(kategoriSet).sort();
                        let options = '<option value="all">Semua</option>';
                        sortedKategori.forEach((kategori) => {
                            options += `<option value="${kategori}">${kategori}</option>`;
                        });
                        kategoriSelect.innerHTML = options;
                        resolve();
                    } else {
                        kategoriSelect.innerHTML = '<option value="all">Tidak ada kategori</option>';
                        resolve();
                    }
                }).catch((error) => {
                    console.error("Error fetching categories: ", error);
                    reject(error);
                });
            });
        }

        function populateItemSelect(kategori) {
            return new Promise((resolve, reject) => {
                const itemsRef = ref(db, 'Items');
                let itemQuery;

                if (kategori === 'all') {
                    itemQuery = itemsRef;
                } else {
                    itemQuery = query(itemsRef, orderByChild('kategori'), equalTo(kategori));
                }

                get(itemQuery).then((snapshot) => {
                    if (snapshot.exists()) {
                        let items = [];
                        snapshot.forEach((item) => {
                            const itemData = item.val();
                            items.push({ id: item.key, name: itemData.item });
                        });
                        items.sort((a, b) => a.name.localeCompare(b.name));
                        let options = '<option value="">Pilih Item</option>';
                        items.forEach((item) => {
                            options += `<option value="${item.name}">${item.name}</option>`;
                        });
                        itemSelect.innerHTML = options;
                        resolve();
                    } else {
                        itemSelect.innerHTML = '<option value="">Tidak ada item</option>';
                        resolve();
                    }
                }).catch((error) => {
                    console.error("Error fetching items: ", error);
                    reject(error);
                });
            });
        }



        kategoriSelect.addEventListener('change', function () {
            populateItemSelect(this.value);
        });


        function populateStokList() {
            const dbRef = ref(db, 'Stok');

            get(dbRef).then((snapshot) => {
                const stoksArray = [];
                snapshot.forEach((childSnapshot) => {
                    const stokKey = childSnapshot.key;
                    const stokData = childSnapshot.val();
                    stoksArray.push({ key: stokKey, data: stokData });
                });

                stoksArray.sort((a, b) => a.data.item.toLowerCase() > b.data.item.toLowerCase() ? 1 : -1);

                stokList.innerHTML = '';
                stoksArray.forEach((stokObj) => {
                    const stokKey = stokObj.key;
                    const stokData = stokObj.data;

                    const tr = document.createElement('tr');

                    const tdItem = document.createElement('td');
                    tdItem.textContent = stokData.kategori + ' - ' + stokData.item;
                    const tdQty = document.createElement('td');
                    tdQty.textContent = stokData.qty;
                    const tdKondisi = document.createElement('td');
                    tdKondisi.textContent = stokData.kondisi;
                    const tdRak = document.createElement('td');
                    tdRak.textContent = stokData.rak;
                    const tdBaris = document.createElement('td');
                    tdBaris.textContent = stokData.baris;
                    const tdNomorKotak = document.createElement('td');
                    tdNomorKotak.textContent = stokData.nomorKotak;
                    const tdTrip = document.createElement('td');
                    tdTrip.textContent = stokData.trip;
                    const tdTanggal = document.createElement('td');
                    tdTanggal.textContent = stokData.tanggal;
                    const tdAksi = document.createElement('td');

                    const moveBtn = document.createElement('button');
                    moveBtn.textContent = 'Pindah';
                    moveBtn.addEventListener('click', () => moveStok(stokKey, stokData));

                    const delBtn = document.createElement('button');
                    delBtn.textContent = 'Delete';
                    delBtn.addEventListener('click', () => deleteStok(stokKey));

                    const editBtn = document.createElement('button');
                    editBtn.textContent = 'Edit';
                    editBtn.addEventListener('click', () => editStok(stokKey, stokData));

                    const takeBtn = document.createElement('button');
                    takeBtn.textContent = 'Ambil';
                    takeBtn.addEventListener('click', () => takeStok(stokKey));


                    const buttonCell = document.createElement('div');
                    buttonCell.className = 'button-cell';
                    buttonCell.appendChild(moveBtn);
                    buttonCell.appendChild(editBtn);
                    buttonCell.appendChild(delBtn);
                    buttonCell.appendChild(takeBtn);

                    tdAksi.appendChild(buttonCell);
                    tr.appendChild(tdItem);
                    tr.appendChild(tdQty);
                    tr.appendChild(tdKondisi);
                    tr.appendChild(tdRak);
                    tr.appendChild(tdBaris);
                    tr.appendChild(tdNomorKotak);
                    tr.appendChild(tdTrip);
                    tr.appendChild(tdTanggal);
                    tr.appendChild(tdAksi);

                    stokList.appendChild(tr);  // Tambahkan baris ke tabel
                });
            }).catch((error) => {
                console.error("Error fetching data:", error);
            });
        }

        function moveStok(stokKey, stokData) {
            const selectedItem = stokData.item;
            const selectedKategori = stokData.kategori;
            const qty = stokData.qty;
            const kondisi = stokData.kondisi;
            const rak = stokData.rak;
            const baris = stokData.baris;
            const nomorKotak = stokData.nomorKotak;
            const trip = stokData.trip;
            const tanggal = stokData.tanggal;

            // Add item to ItemInfo database
            const itemInfoRef = push(ref(db, 'ItemInfo'));
            set(itemInfoRef, {
                item: selectedItem,
                kategori: selectedKategori,
                qty: qty,
                kondisi: kondisi,
                rak: rak,
                baris: baris,
                nomorKotak: nomorKotak,
                trip: trip,
                tanggal: tanggal,
            }).then(() => {
                // Item successfully added to ItemInfo, now remove from Stok
                remove(ref(db, 'Stok/' + stokKey)).then(() => {
                    alert("Item berhasil dipindahkan ke ItemInfo dan dihapus dari Stok");
                    populateStokList();  // Refresh stok list after deletion
                }).catch((error) => {
                    alert("Gagal menghapus item dari Stok");
                    console.error(error);
                });
            }).catch((error) => {
                alert("Gagal memindahkan item ke ItemInfo");
                console.error(error);
            });
        }

        function editStok(stokKey, stokData) {
            // Show modal
            modal.style.display = "block";

            // Set modal title to "Edit Item"
            const modalTitle = document.querySelector('.modal-content h2');
            modalTitle.textContent = "Edit Item";

            // Change save button text to "Update"
            saveButton.textContent = "Update";

            // First populate the dropdowns, then set the values
            populateKategoriSelect().then(() => {
                kategoriSelect.value = stokData.kategori;
                populateItemSelect(stokData.kategori).then(() => {
                    itemSelect.value = stokData.item;
                });
            });

            // Set other input values
            qtyInput.value = stokData.qty;
            kondisiSelect.value = stokData.kondisi;
            rakInput.value = stokData.rak;
            barisInput.value = stokData.baris;
            nomorKotakInput.value = stokData.nomorKotak;
            tripInput.value = stokData.trip;
            tanggalInput.value = stokData.tanggal;

            saveButton.onclick = function () {
                const selectedItem = itemSelect.value;
                const selectedKategori = kategoriSelect.value;
                const qty = parseInt(qtyInput.value);
                const kondisi = kondisiSelect.value;
                const rak = rakInput.value.trim();
                const baris = barisInput.value.trim();
                const nomorKotak = nomorKotakInput.value.trim();
                const trip = tripInput.value.trim();
                const tanggal = tanggalInput.value.trim();

                if (selectedItem && selectedKategori && qty && kondisi && rak && baris && nomorKotak && trip && tanggal) {
                    update(ref(db, 'Stok/' + stokKey), {
                        item: selectedItem,
                        kategori: selectedKategori,
                        qty: qty,
                        kondisi: kondisi,
                        rak: rak,
                        baris: baris,
                        nomorKotak: nomorKotak,
                        trip: trip,
                        tanggal: tanggal,
                    }).then(() => {
                        alert("Item berhasil diperbarui");
                        clearForm();
                        modal.style.display = "none";
                        populateStokList();
                    }).catch((error) => {
                        alert("Gagal memperbarui item");
                        console.error(error);
                    });
                } else {
                    alert("Pilih kategori dan masukkan item yang valid");
                }
            }
        }


        function deleteStok(stokKey) {
            if (confirm("Apakah anda yakin ingin menghapus stok ini?")) {
                remove(ref(db, 'Stok/' + stokKey)).then(() => {
                    alert("Stok berhasil dihapus");
                    populateStokList();
                }).catch((error) => {
                    alert("Gagal menghapus stok");
                    console.error(error);
                })
            }
        }

        function filterList() {
            const filter = searchInput.value.toLowerCase();
            const rows = stokList.getElementsByTagName('tr');

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const text = row.getElementsByTagName('td')[0].textContent || row.getElementsByTagName('td')[0].innerText;
                if (text.toLowerCase().includes(filter)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            }
        }

        searchInput.addEventListener('input', filterList);
        populateKategoriSelect();
        populateStokList();

    </script>
</body>

</html>
