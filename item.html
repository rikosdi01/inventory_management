<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .navbar {
            overflow: hidden;
            background-color: #EB1E26;
            position: fixed;
            top: 0;
            width: 100%;
            height: 7vh;
            z-index: 1000;
        }

        .navbar a {
            float: right;
            display: block;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 25px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            padding: 80px 20px 20px 20px;
        }

        .search-bar {
            padding: 0 20px 0 0;
        }

        .search-bar input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .button-cell {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            align-items: center;
        }

        .button-cell button {
            padding: 5px 10px;
            background-color: #EB1E26;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .button-cell button:hover {
            background-color: #d01720;
        }

        .hidden {
            display: none;
        }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #d01720;
            border-radius: 50%;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab a {
            color: white;
            font-size: 24px;
            text-decoration: none;
        }

        .fab:hover {
            background-color: #d01720;
        }

        .close,
        .close-confirm {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus,
        .close-confirm:hover,
        .close-confirm:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        .confirm-delete {
            justify-content: flex-end;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0, 0, 0);
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 5px;
        }

        .modal input,
        .modal select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .modal button {
            padding: 10px 20px;
            background-color: #EB1E26;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal button:hover {
            background-color: #d01720;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="home.html">Menu Utama</a>
        <a href="kategori.html">Kategori</a>
        <a href="item.html">Item</a>
        <a href="stok.html">Tambah Stok</a>
    </div>

    <div class="content">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari item...">
        </div>
        <table id="kategoriTable">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Kategori</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="kategoriList">
                <!-- Rows will be inserted here -->
            </tbody>
        </table>
    </div>

    <div class="fab">
        <a href="#" id="openModal">+</a>
    </div>

    <!-- The Modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Tambah Item</h2>
            <label for="kategoriSelect">Kategori:</label>
            <select id="kategoriSelect">
                <!-- Options will be populated dynamically -->
            </select>
            <label for="itemInput">Item:</label>
            <input type="text" id="itemInput" placeholder="Enter item">
            <button id="saveItem">Save</button>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <span class="close-confirm">&times;</span>
            <h2>Konfirmasi Hapus Item</h2>
            <p>Apakah Anda yakin ingin menghapus item ini?</p>
            <button id="confirmDelete">Hapus</button>
            <button id="cancelDelete">Batal</button>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from "./firebase-config.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        import { getDatabase, ref, push, get, set, update, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const db = getDatabase();

        let kategoriList = document.getElementById('kategoriList');
        let searchInput = document.getElementById('searchInput');

        let modal = document.getElementById("myModal");
        let btn = document.getElementById("openModal");
        let span = document.querySelector(".modal-content .close");
        let saveButton = document.getElementById("saveItem");
        let kategoriSelect = document.getElementById("kategoriSelect");
        let itemInput = document.getElementById("itemInput");

        let confirmModal = document.getElementById("confirmModal");
        let confirmDeleteButton = document.getElementById("confirmDelete");
        let cancelDeleteButton = document.getElementById("cancelDelete");
        let spanConfirm = document.querySelector(".modal-content .close-confirm");

        btn.onclick = function () {
            itemInput.value = '';
            populateDropdown(); // Populate dropdown with categories

            const modalTitle = document.querySelector('.modal-content h2');
            modalTitle.textContent = "Add New Item";

            saveButton.textContent = "Save";

            modal.style.display = "block";

            saveButton.onclick = function () {
                const selectedKategori = kategoriSelect.value;
                const newItemValue = itemInput.value.trim();

                if (selectedKategori && newItemValue) {
                    const newItemRef = push(ref(db, 'Items'));
                    set(newItemRef, {
                        kategori: selectedKategori,
                        item: newItemValue,
                    }).then(() => {
                        alert("Item berhasil ditambahkan");
                        itemInput.value = '';
                        modal.style.display = "none";
                        displayItems();
                    }).catch((error) => {
                        alert("Gagal menambahkan item");
                        console.error(error);
                    });
                } else {
                    alert("Pilih kategori dan masukkan item yang valid");
                }
            };
        };

        span.onclick = function () {
            modal.style.display = "none";
        }

        spanConfirm.onclick = function () {
            confirmModal.style.display = "none";
        }

        function populateDropdown() {
            const dbRef = ref(db, 'Kategori');
            get(dbRef).then((snapshot) => {
                const kategoriOptions = [];

                snapshot.forEach((childSnapshot) => {
                    const kategoriData = childSnapshot.val().kategori;
                    kategoriOptions.push(kategoriData);
                });

                kategoriOptions.sort((a, b) => a.toLowerCase() > b.toLowerCase() ? 1 : -1);

                kategoriSelect.innerHTML = '';
                kategoriOptions.forEach((kategoriData) => {
                    const option = document.createElement('option');
                    option.value = kategoriData;
                    option.textContent = kategoriData;
                    kategoriSelect.appendChild(option);
                });
            }).catch((error) => {
                console.error("Error fetching data:", error);
            });
        }

        function displayItems() {
            const dbRef = ref(db, 'Items');

            get(dbRef).then((snapshot) => {
                const itemsArray = [];
                snapshot.forEach((childSnapshot) => {
                    const itemKey = childSnapshot.key;
                    const itemData = childSnapshot.val();
                    itemsArray.push({ key: itemKey, data: itemData });
                });

                itemsArray.sort((a, b) => {
                    if (a.data.kategori.toLowerCase() > b.data.kategori.toLowerCase()) {
                        return 1;
                    } else if (a.data.kategori.toLowerCase() < b.data.kategori.toLowerCase()) {
                        return -1;
                    } else {
                        if (a.data.item.toLowerCase() > b.data.item.toLowerCase()) {
                            return 1;
                        } else if (a.data.item.toLowerCase() < b.data.item.toLowerCase()) {
                            return -1;
                        } else {
                            return 0;
                        }
                    }
                });

                kategoriList.innerHTML = '';
                itemsArray.forEach((itemObj) => {
                    const itemKey = itemObj.key;
                    const itemData = itemObj.data;

                    const tr = document.createElement('tr');
                    const tdItem = document.createElement('td');
                    tdItem.textContent = itemData.item;

                    const tdKategori = document.createElement('td');
                    tdKategori.textContent = itemData.kategori;

                    const tdAksi = document.createElement('td');
                    const editBtn = document.createElement('button');
                    editBtn.textContent = 'Edit';
                    editBtn.addEventListener('click', () => editItem(itemKey, itemData));

                    const delBtn = document.createElement('button');
                    delBtn.textContent = 'Delete';
                    delBtn.addEventListener('click', () => showConfirmModal(itemKey));

                    const buttonCell = document.createElement('div');
                    buttonCell.className = 'button-cell';
                    buttonCell.appendChild(editBtn);
                    buttonCell.appendChild(delBtn);

                    tdAksi.appendChild(buttonCell);
                    tr.appendChild(tdItem);
                    tr.appendChild(tdKategori);
                    tr.appendChild(tdAksi);

                    tr.setAttribute('data-key', itemKey);

                    kategoriList.appendChild(tr);
                });
            }).catch((error) => {
                console.error("Error fetching data:", error);
            });
        }

        function editItem(itemKey, itemData) {
            itemInput.value = itemData.item;
            populateDropdown(); // Populate dropdown with categories
            kategoriSelect.value = itemData.kategori;

            const modalTitle = document.querySelector('.modal-content h2');
            modalTitle.textContent = "Edit Item";

            saveButton.textContent = "Update";

            modal.style.display = "block";

            saveButton.onclick = function () {
                const selectedKategori = kategoriSelect.value;
                const newItemValue = itemInput.value.trim();

                if (selectedKategori && newItemValue) {
                    update(ref(db, 'Items/' + itemKey), {
                        kategori: selectedKategori,
                        item: newItemValue,
                    }).then(() => {
                        alert("Item berhasil diupdate");
                        itemInput.value = '';
                        modal.style.display = "none";
                        displayItems();
                    }).catch((error) => {
                        alert("Gagal mengupdate item");
                        console.error(error);
                    });
                } else {
                    alert("Pilih kategori dan masukkan item yang valid");
                }
            };
        }

        function showConfirmModal(itemKey) {
            confirmModal.style.display = "block";

            confirmDeleteButton.onclick = function () {
                deleteItem(itemKey);
                confirmModal.style.display = "none";
            };

            cancelDeleteButton.onclick = function () {
                confirmModal.style.display = "none";
            };
        }

        function deleteItem(itemKey) {
            remove(ref(db, 'Items/' + itemKey)).then(() => {
                alert("Item berhasil dihapus");
                displayItems();
            }).catch((error) => {
                alert("Gagal menghapus item");
                console.error(error);
            });
        }

        function filterList() {
            const filter = searchInput.value.toLowerCase();
            const rows = kategoriList.getElementsByTagName('tr');

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const text = row.getElementsByTagName('td')[0].textContent || row.getElementsByTagName('td')[0].innerText;
                if (text.toLowerCase().includes(filter)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            }
        }

        searchInput.addEventListener('input', filterList);

        displayItems();
    </script>

</body>

</html>
