<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .navbar {
            overflow: hidden;
            background-color: #EB1E26;
            position: fixed;
            top: 0;
            width: 100%;
            height: 7vh;
            z-index: 1000;
        }

        .navbar a {
            float: right;
            display: block;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 25px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            padding: 80px 20px 20px 20px;
        }

        .search-bar {
            padding: 0 20px 0 0;
        }

        .search-bar input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .button-cell {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            align-items: center;
        }

        .button-cell button {
            padding: 5px 10px;
            background-color: #EB1E26;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .button-cell button:hover {
            background-color: #d01720;
        }

        .hidden {
            display: none;
        }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #d01720;
            border-radius: 50%;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab a {
            color: white;
            font-size: 24px;
            text-decoration: none;
        }

        .fab:hover {
            background-color: #d01720;
        }

        .close,
        .close-confirm {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus,
        .close-confirm:hover,
        .close-confirm:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        .confirm-delete {
            justify-content: flex-end;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0, 0, 0);
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 5px;
        }

        .modal input,
        .modal select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .modal button {
            padding: 10px 20px;
            background-color: #EB1E26;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal button:hover {
            background-color: #d01720;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="home.html">Menu Utama</a>
        <a href="kategori.html">Kategori</a>
        <a href="item.html">Item</a>
        <a href="stok.html">Tambah Stok</a>
    </div>

    <div class="content">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari kategori...">
        </div>
        <table id="kategoriTable">
            <thead>
                <tr>
                    <th>Kategori</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="kategoriList">
                <!-- Rows will be inserted here -->
            </tbody>
        </table>
    </div>

    <div class="fab">
        <a href="#" id="openModal">+</a>
    </div>

    <!-- The Modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Tambah Kategori</h2>
            <label for="kategoriInput">Kategori:</label>
            <input type="text" id="kategoriInput" placeholder="Masukkan kategori">
            <button id="saveKategori">Save</button>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <span class="close-confirm">&times;</span>
            <h2>Konfirmasi Hapus Kategori</h2>
            <p>Apakah Anda yakin ingin menghapus kategori ini?</p>
            <button id="confirmDelete">Hapus</button>
            <button id="cancelDelete">Batal</button>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from "./firebase-config.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        import { getDatabase, ref, push, get, set, update, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const db = getDatabase();

        let kategoriList = document.getElementById('kategoriList');
        let searchInput = document.getElementById('searchInput');

        let modal = document.getElementById("myModal");
        let btn = document.getElementById("openModal");
        let span = document.querySelector(".modal-content .close");
        let saveButton = document.getElementById("saveKategori");
        let kategoriInput = document.getElementById("kategoriInput");

        let confirmModal = document.getElementById("confirmModal");
        let confirmDeleteButton = document.getElementById("confirmDelete");
        let cancelDeleteButton = document.getElementById("cancelDelete");
        let spanConfirm = document.querySelector(".modal-content .close-confirm");


        btn.onclick = function () {
            kategoriInput.value = '';

            const modalTitle = document.querySelector('.modal-content h2');
            modalTitle.textContent = "Tambah Kategori";

            saveButton.textContent = "Save";

            modal.style.display = "block";

            saveButton.onclick = function () {
                const newKategoriValue = kategoriInput.value.trim();

                if (newKategoriValue) {
                    const q = query(ref(db, 'Kategori'), orderByChild('kategori'), equalTo(newKategoriValue));

                    get(q).then((snapshot) => {
                        if (snapshot.exists()) {
                            alert("Kategori sudah ada");
                        } else {
                            const newKategoriRef = push(ref(db, 'Kategori'));
                            set(newKategoriRef, {
                                kategori: newKategoriValue,
                            }).then(() => {
                                alert("Kategori berhasil ditambahkan");
                                kategoriInput.value = '';
                                modal.style.display = "none";
                                displayKategori();
                            }).catch((error) => {
                                alert("Gagal menambahkan kategori");
                                console.error(error);
                            });
                        }
                    }).catch((error) => {
                        alert("Gagal memeriksa kategori");
                        console.error(error);
                    });
                } else {
                    alert("Masukkan kategori yang valid");
                }
            };
        };

        span.onclick = function () {
            modal.style.display = "none";
        }

        spanConfirm.onclick = function () {
            confirmModal.style.display = "none";
        }

        function displayKategori() {
            const dbRef = ref(db, 'Kategori');

            get(dbRef).then((snapshot) => {
                const kategoriArray = [];
                snapshot.forEach((childSnapshot) => {
                    const kategoriKey = childSnapshot.key;
                    const kategoriData = childSnapshot.val();
                    kategoriArray.push({ key: kategoriKey, data: kategoriData });
                });

                kategoriArray.sort((a, b) => a.data.kategori.toLowerCase() > b.data.kategori.toLowerCase() ? 1 : -1);

                kategoriList.innerHTML = '';
                kategoriArray.forEach((kategoriObj) => {
                    const kategoriKey = kategoriObj.key;
                    const kategoriData = kategoriObj.data;

                    const tr = document.createElement('tr');

                    const tdKategori = document.createElement('td');
                    tdKategori.textContent = kategoriData.kategori;

                    const tdAksi = document.createElement('td');
                    const editBtn = document.createElement('button');
                    editBtn.textContent = 'Edit';
                    editBtn.addEventListener('click', () => editKategori(kategoriKey, kategoriData));

                    const delBtn = document.createElement('button');
                    delBtn.textContent = 'Delete';
                    delBtn.addEventListener('click', () => showConfirmModal(kategoriKey));

                    const buttonCell = document.createElement('div');
                    buttonCell.className = 'button-cell';
                    buttonCell.appendChild(editBtn);
                    buttonCell.appendChild(delBtn);

                    tdAksi.appendChild(buttonCell);
                    tr.appendChild(tdKategori);
                    tr.appendChild(tdKategori);
                    tr.appendChild(tdAksi);

                    tr.setAttribute('data-key', kategoriKey);

                    kategoriList.appendChild(tr);
                });
            }).catch((error) => {
                console.error("Error fetching data:", error);
            });
        }

        function editKategori(kategoriKey, kategoriData) {
            kategoriInput.value = kategoriData.kategori;

            const modalTitle = document.querySelector('.modal-content h2');
            modalTitle.textContent = "Edit Kategori";

            saveButton.textContent = "Update";

            modal.style.display = "block";

            saveButton.onclick = function () {

                const newKategoriValue = kategoriInput.value.trim();

                if (newKategoriValue) {
                    update(ref(db, 'Kategori/' + kategoriKey), {
                        kategori: newKategoriValue,
                    }).then(() => {
                        alert("Item berhasil diupdate");
                        kategoriInput.value = '';
                        modal.style.display = "none";
                        displayKategori();
                    }).catch((error) => {
                        alert("Gagal mengupdate kategori");
                        console.error(error);
                    });
                } else {
                    alert("Masukkan kategori yang valid");
                }
            };
        }

        function showConfirmModal(kategoriKey) {
            confirmModal.style.display = "block";

            confirmDeleteButton.onclick = function () {
                deleteKategori(kategoriKey);
                confirmModal.style.display = "none";
            };

            cancelDeleteButton.onclick = function () {
                confirmModal.style.display = "none";
            };
        }

        function deleteKategori(kategoriKey) {
            remove(ref(db, 'Kategori/' + kategoriKey)).then(() => {
                alert("Kategori berhasil dihapus");
                displayKategori();
            }).catch((error) => {
                alert("Gagal menghapus kategori");
                console.error(error);
            });
        }

        function filterList() {
            const filter = searchInput.value.toLowerCase();
            const rows = kategoriList.getElementsByTagName('tr');

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const text = row.getElementsByTagName('td')[0].textContent || row.getElementsByTagName('td')[0].innerText;
                if (text.toLowerCase().includes(filter)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            }
        }

        searchInput.addEventListener('input', filterList);

        displayKategori();
    </script>

</body>

</html>
